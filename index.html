<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Preconnect to critical origins for faster loading -->
    
    <link rel="preconnect" href="https://cdn.mdaccula.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.mdaccula.com">
    
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="https://connect.facebook.net">
    
    <link rel="icon" type="image/png" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    
    <meta name="description" content="MDAccula - A maior agência de música eletrônica de São Paulo. Eventos, festas, DJs e conteúdo sobre techno, house e cultura eletrônica.">
    <meta name="keywords" content="música eletrônica, techno, house, são paulo, eventos, festas, dj, mdaccula">
    <meta name="author" content="MDAccula" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MDAccula" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://mdaccula.com" />
    <title>MDAccula - Música Eletrônica em São Paulo</title>

  
  <meta property="og:image" content="https://mdaccula.com/logo-mdaccula.jpeg">
  <meta name="twitter:image" content="https://mdaccula.com/logo-mdaccula.jpeg">
  <meta property="og:title" content="MDAccula - Música Eletrônica em São Paulo">
  <meta name="twitter:title" content="MDAccula - Música Eletrônica em São Paulo">
  <meta property="og:description" content="MDAccula - A maior agência de música eletrônica de São Paulo. Eventos, festas, DJs e conteúdo sobre techno, house e cultura eletrônica.">
  <meta name="twitter:description" content="MDAccula - A maior agência de música eletrônica de São Paulo. Eventos, festas, DJs e conteúdo sobre techno, house e cultura eletrônica.">
</head>

  <body>
    <!-- Critical inline CSS for immediate FCP -->
    <style>
      #root-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0a0a0a;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root-loader .logo {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #9333ea, #c026d3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      #root-loader .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(147, 51, 234, 0.3);
        border-top-color: #9333ea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div id="root">
      <!-- Loader inside root: React will replace this on mount -->
      <div id="root-loader">
        <div class="logo">MDAccula</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
