  <body>
    <!-- Critical inline CSS for immediate FCP -->
    <style>
      #root-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0a0a0a;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root-loader .logo {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #9333ea, #c026d3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      #root-loader .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(147, 51, 234, 0.3);
        border-top-color: #9333ea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div id="root">
      <!-- Loader inside root: React will replace this on mount -->
      <div id="root-loader">
        <div class="logo">MDAccula</div>
        <div class="spinner"></div>
      </div>
    </div>
