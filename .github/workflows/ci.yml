name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Job 1: Lint, Type-check e Build
  # ============================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run Type Check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Run Tests with Coverage
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Check Prettier Formatting
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,css,md}"
        continue-on-error: true

      - name: Check unused dependencies (depcheck)
        run: npx depcheck --skip-missing
        continue-on-error: true

      - name: Run Deno tests (edge functions)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
        continue-on-error: true
      - name: Execute Deno tests
        run: deno test --allow-net --allow-env --allow-read supabase/functions/_shared/
        continue-on-error: true

  # ============================================
  # Job 2: Build de Produção
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # Job 3: Preview Deploy (PRs)
  # ============================================
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Lovable gerencia o deploy automaticamente
      # Este step é um placeholder para integração futura
      - name: Preview deployment ready
        run: |
          echo "✅ Build successful! Preview available via Lovable."
          echo "PR: #${{ github.event.pull_request.number }}"
          echo "Branch: ${{ github.head_ref }}"

  # ============================================
  # Job 4: Production Deploy (main branch)
  # ============================================
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Lovable gerencia o deploy automaticamente
      # Este step confirma que o build está pronto
      - name: Production deployment ready
        run: |
          echo "✅ Production build successful!"
          echo "Commit: ${{ github.sha }}"
          echo "Lovable will handle the deployment automatically."

  # ============================================
  # Job 5: Security Audit
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true
